<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cidades e Estados</title>
</head>
<body>
    <div>
        <input type="search" id="searchInput">
        <button id="search">Pesquisar</button>
        <button id="getAll">Buscar todas as cidade</button>
    </div>
    <div>
        <p>Resultado:</p>
        <span id="resultado">

        </span>
    </div>

    <script>
        document.getElementById("search").addEventListener("click", async () => {
            const nome = String(document.getElementById("searchInput").value)
            const response = await fetch("http://localhost:3030/api/buscarCidade", {
                method: 'POST',
                headers: {
                    'Content-Type': "application/json"
                },
                body: JSON.stringify({
                    "nome": nome
                })
            })

            const resposta = await response.json()

            console.log(resposta.resposta)

            document.getElementById("resultado").innerHTML = ` Nome: ${resposta.resposta.nome_cidade} <br> Estado: ${resposta.resposta.sigla_estado}`

        })
    </script>
</body>
</html>
